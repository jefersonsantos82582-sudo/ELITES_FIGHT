services:
  - type: web
    name: elites-fight
    env: node
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: elites-db
          property: connectionString
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: elites-db
    plan: free
    databaseName: elites_fight_db
    user: elites_admin
