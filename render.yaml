services:
  - type: web
    name: elites-fight
    runtime: node
    plan: free
    branch: build-output
    buildCommand: npm install --omit=dev
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FIREBASE_PROJECT_ID
        value: elites-fight
      - key: DATABASE_URL
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      - key: VITE_MERCADO_PAGO_PUBLIC_KEY
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

  - type: cron
    name: subscription-downgrade
    runtime: node
    plan: free
    branch: build-output
    schedule: '0 0 0 * * *'
    buildCommand: npm install --omit=dev
    startCommand: npm run cron
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
