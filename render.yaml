services:
  - type: web
    name: elites-fight
    runtime: node
    plan: free
    buildCommand: npm ci --legacy-peer-deps && npm run check && npm run build
    preDeployCommand: npm run db:push
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FIREBASE_PROJECT_ID
        value: elites-fight
      - key: DATABASE_URL
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
